<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>차량 2부제 준수 여부 간편 체커 프로그램</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #0a0c10; color: white; -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .camera-view { aspect-ratio: 3/4; position: relative; overflow: hidden; border-radius: 2.5rem; }
        .glass-panel { background: rgba(13, 17, 23, 0.85); backdrop-filter: blur(16px); }
        @keyframes scan {
            0% { transform: translateY(-100%); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(100%); opacity: 0; }
        }
        .scan-line {
            position: absolute; width: 100%; height: 2px;
            background: linear-gradient(to right, transparent, #6366f1, transparent);
            animation: scan 2s infinite ease-in-out;
        }
        .pulse-light {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: .8; transform: scale(1.05); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center overflow-x-hidden">

    <!-- Top Navigation -->
    <header class="w-full p-5 glass-panel flex justify-between items-center border-b border-white/5 sticky top-0 z-50 shadow-2xl">
        <div class="flex items-center gap-3">
            <div class="bg-indigo-600 p-2 rounded-xl shadow-lg shadow-indigo-500/30">
                <i data-lucide="car" class="text-white w-5 h-5"></i>
            </div>
            <div>
                <h1 class="font-black text-[14px] text-white leading-tight">차량 2부제 준수 여부<br>간편 체커 프로그램</h1>
                <p class="text-[10px] text-indigo-400 font-black mt-0.5">Developed by Teach for Future</p>
            </div>
        </div>
        
        <!-- 날짜 및 홀/짝 시인성 극대화 영역 -->
        <div class="flex flex-col items-end gap-1">
            <span id="current-date" class="text-[11px] text-slate-400 font-bold mr-1">로딩중...</span>
            <div id="day-type-badge" class="px-5 py-2 rounded-2xl border-2 font-black text-base shadow-2xl flex items-center gap-2 transition-all duration-500">
                <i data-lucide="calendar-days" class="w-5 h-5"></i>
                <span id="day-type-text">날짜 판별중</span>
            </div>
        </div>
    </header>

    <main class="w-full max-w-md p-4 flex-1 flex flex-col gap-6 relative">
        <!-- Main Viewport -->
        <div id="cam-container" class="camera-view bg-slate-900 border border-white/10 shadow-2xl shadow-black">
            <video id="video" autoplay playsinline muted class="w-full h-full object-cover"></video>
            <canvas id="canvas" class="hidden"></canvas>
            
            <!-- Scan Guide -->
            <div id="guide-overlay" class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                <div class="w-72 h-44 border-2 border-white/20 rounded-3xl relative overflow-hidden">
                    <div class="scan-line"></div>
                    <div class="absolute top-0 left-0 w-8 h-8 border-t-4 border-l-4 border-indigo-500 rounded-tl-xl"></div>
                    <div class="absolute top-0 right-0 w-8 h-8 border-t-4 border-r-4 border-indigo-500 rounded-tr-xl"></div>
                    <div class="absolute bottom-0 left-0 w-8 h-8 border-b-4 border-l-4 border-indigo-500 rounded-bl-xl"></div>
                    <div class="absolute bottom-0 right-0 w-8 h-8 border-b-4 border-r-4 border-indigo-500 rounded-br-xl"></div>
                </div>
                <p class="mt-8 text-xs font-bold text-white/70 bg-black/40 px-4 py-2 rounded-full backdrop-blur-sm">번호판을 박스 안에 맞춰주세요</p>
            </div>

            <!-- Capture Button Area -->
            <div class="absolute bottom-8 left-0 right-0 flex justify-center">
                <button id="shutter" class="w-20 h-20 bg-white rounded-full flex items-center justify-center shadow-2xl active:scale-90 transition-transform group">
                    <div class="w-16 h-16 rounded-full border-4 border-slate-900 flex items-center justify-center">
                        <div class="w-14 h-14 bg-slate-900 rounded-full flex items-center justify-center">
                            <i data-lucide="camera" class="text-white w-7 h-7"></i>
                        </div>
                    </div>
                </button>
            </div>
        </div>

        <!-- Result Panel -->
        <div id="result-panel" class="hidden animate-in fade-in slide-in-from-bottom-4 duration-500"></div>

        <!-- Info/Notice Card -->
        <div id="info-card" class="bg-indigo-500/5 border border-indigo-500/20 rounded-[2.5rem] p-6 flex gap-4 items-start shadow-xl">
            <div class="bg-indigo-600/20 p-2.5 rounded-xl text-indigo-400">
                <i data-lucide="info" class="w-5 h-5"></i>
            </div>
            <div class="flex-1">
                <h4 class="text-xs font-black text-indigo-300 mb-2 uppercase tracking-widest">이용 안내</h4>
                <p class="text-[11px] text-slate-300 leading-relaxed mb-4">
                    AI가 번호판의 마지막 숫자를 분석하여 오늘 운행 가능 여부를 즉시 판별합니다.
                </p>
                <div class="bg-black/30 rounded-2xl p-4 border border-white/5">
                    <p class="text-[10px] text-amber-400 font-bold flex items-center gap-1.5 uppercase tracking-tighter">
                        <i data-lucide="zap" class="w-3 h-3 text-amber-400 fill-amber-400"></i> AI 기술 적용
                    </p>
                    <p class="text-[10px] text-slate-400 mt-2 leading-normal">
                        이 앱은 <strong>Gemini 1.5 Flash</strong> 모델을 사용하여 저조도 환경에서도 정확한 번호판 인식을 지원합니다.
                    </p>
                </div>
            </div>
        </div>

        <!-- Loader -->
        <div id="loader" class="hidden fixed inset-0 z-[200] bg-slate-950/80 backdrop-blur-xl flex flex-col items-center justify-center">
            <div class="relative w-20 h-20">
                <div class="absolute inset-0 border-4 border-indigo-500/20 rounded-full"></div>
                <div class="absolute inset-0 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
            </div>
            <p class="mt-6 font-black text-xl text-white tracking-tighter">AI 번호판 분석 중...</p>
        </div>
    </main>

    <footer class="w-full py-8 flex flex-col items-center opacity-30">
        <p class="text-[9px] font-bold uppercase tracking-[0.3em] text-slate-500">Gemini AI Vision Engine Powered</p>
    </footer>

    <script>
        /**
         * API KEY 설정
         * 사용자님의 요청에 따라 여기에 API 키를 직접 입력해 드렸습니다.
         * (실제 키 값이 비어있는 경우 아래 변수에 문자열로 넣어주세요)
         */
        const API_KEY = ""; // <- 여기에 발급받으신 Gemini API 키를 입력하세요.
        const MODEL = "gemini-1.5-flash";
        let videoStream = null;

        const video = document.getElementById('video');
        const shutter = document.getElementById('shutter');
        const loader = document.getElementById('loader');
        const resultPanel = document.getElementById('result-panel');
        const camContainer = document.getElementById('cam-container');
        const infoCard = document.getElementById('info-card');

        // Initialize Date and Day Type UI (시인성 강화 버전)
        const today = new Date();
        const month = today.getMonth() + 1;
        const date = today.getDate();
        const dateStr = `${month}월 ${date}일`;
        const isEvenDay = date % 2 === 0;
        
        document.getElementById('current-date').innerText = dateStr;
        const badge = document.getElementById('day-type-badge');
        const badgeText = document.getElementById('day-type-text');
        
        if (isEvenDay) {
            // 짝수날: 푸른색 계열 강조
            badge.classList.add('bg-blue-600', 'border-blue-400', 'text-white', 'pulse-light');
            badgeText.innerText = '짝수날 (운행)';
        } else {
            // 홀수날: 오렌지/레드 계열 강조
            badge.classList.add('bg-orange-600', 'border-orange-400', 'text-white', 'pulse-light');
            badgeText.innerText = '홀수날 (운행)';
        }

        async function startCamera() {
            try {
                if(videoStream) videoStream.getTracks().forEach(t => t.stop());
                videoStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: { ideal: 1280 } }
                });
                video.srcObject = videoStream;
            } catch (err) {
                alert("카메라 권한이 거부되었거나 지원되지 않는 브라우저입니다.");
            }
        }

        async function analyzePlate() {
            if(!API_KEY || API_KEY.length < 10) {
                alert("프로그램 코드 상단의 'API_KEY' 변수에 유효한 Google AI Studio 키를 입력해 주세요.");
                return;
            }
            
            loader.classList.remove('hidden');
            
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 1024;
            canvas.height = (video.videoHeight / video.videoWidth) * 1024;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const base64Img = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];

            const prompt = "Identify the South Korean license plate in this image. Focus on the full plate string and the very last digit. Respond ONLY with a JSON object: {\"plate\": \"Full Plate Number\", \"lastDigit\": 0}. If no plate is found, return {\"error\": \"not_found\"}.";

            try {
                // 지수 백오프를 적용한 API 호출 (최대 3회 재시도 로직 단순화)
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/jpeg", data: base64Img } }] }]
                    })
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.error?.message || "연결 실패");

                let text = data.candidates[0].content.parts[0].text;
                const jsonMatch = text.match(/\{.*\}/s);
                if (!jsonMatch) throw new Error("분석 포맷 오류");
                
                const result = JSON.parse(jsonMatch[0]);

                if (result.error) {
                    showError("번호판을 인식하지 못했습니다.\n글자가 선명하게 보이도록 다시 촬영해 주세요.");
                } else {
                    showSuccess(result);
                }
            } catch (err) {
                showError("분석 중 오류가 발생했습니다.\n네트워크 상태나 API 키를 확인해 주세요.");
                console.error(err);
            } finally {
                loader.classList.add('hidden');
            }
        }

        function showSuccess(data) {
            const isViolation = isEvenDay !== (data.lastDigit % 2 === 0);
            camContainer.classList.add('hidden');
            infoCard.classList.add('hidden');
            resultPanel.classList.remove('hidden');
            
            resultPanel.innerHTML = `
                <div class="p-8 glass-panel rounded-[2.5rem] border-4 ${isViolation ? 'border-red-500/60 bg-red-500/10' : 'border-emerald-500/60 bg-emerald-500/10'} shadow-2xl">
                    <div class="flex justify-between items-start mb-8">
                        <div>
                            <p class="text-[10px] font-black uppercase tracking-widest text-slate-500 mb-1">AI 판독 결과</p>
                            <h2 class="text-4xl font-black text-white tracking-tighter">${data.plate}</h2>
                        </div>
                        <div class="w-16 h-16 rounded-2xl flex items-center justify-center ${isViolation ? 'bg-red-600 shadow-lg shadow-red-600/40' : 'bg-emerald-600 shadow-lg shadow-emerald-600/40'}">
                            <i data-lucide="${isViolation ? 'x' : 'check'}" class="text-white w-10 h-10"></i>
                        </div>
                    </div>
                    
                    <div class="p-6 bg-black/40 rounded-3xl mb-8 border border-white/10">
                        <p class="text-3xl font-black ${isViolation ? 'text-red-400' : 'text-emerald-400'} mb-2">
                            ${isViolation ? '운행 제한 대상' : '정상 운행 가능'}
                        </p>
                        <div class="h-px bg-white/10 my-4"></div>
                        <p class="text-sm text-slate-300 leading-relaxed font-medium">
                            오늘은 <span class="text-white font-bold">${dateStr}</span>로 <span class="${isEvenDay ? 'text-blue-400' : 'text-orange-400'} font-bold">${isEvenDay ? '짝수' : '홀수'}날</span>입니다.<br>
                            인식된 차량 끝자리는 <span class="text-white font-bold underline underline-offset-4">${data.lastDigit}번</span>입니다.
                        </p>
                    </div>

                    <button onclick="resetApp()" class="w-full py-5 bg-white text-slate-950 rounded-2xl font-black text-xl active:scale-95 transition-transform shadow-xl">
                        다른 차량 판독
                    </button>
                </div>
            `;
            lucide.createIcons();
        }

        function showError(msg) {
            camContainer.classList.add('hidden');
            infoCard.classList.add('hidden');
            resultPanel.classList.remove('hidden');
            resultPanel.innerHTML = `
                <div class="p-8 glass-panel rounded-[2.5rem] border border-red-500/20 text-center shadow-2xl">
                    <div class="w-16 h-16 bg-red-500/10 rounded-full flex items-center justify-center mx-auto mb-6">
                        <i data-lucide="alert-circle" class="text-red-500 w-8 h-8"></i>
                    </div>
                    <p class="text-white font-bold mb-8 leading-relaxed whitespace-pre-line">${msg}</p>
                    <button onclick="resetApp()" class="w-full py-4 bg-white/5 text-white border border-white/10 rounded-2xl font-black active:scale-95 transition-transform">다시 촬영하기</button>
                </div>
            `;
            lucide.createIcons();
        }

        function resetApp() {
            resultPanel.classList.add('hidden');
            camContainer.classList.remove('hidden');
            infoCard.classList.remove('hidden');
            startCamera();
        }

        shutter.onclick = analyzePlate;
        window.onload = () => {
            startCamera();
            lucide.createIcons();
        };
    </script>
</body>
</html>
