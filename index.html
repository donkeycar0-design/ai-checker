<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 차량 2부제 판독기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        .animate-shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
        .scanning-line {
            position: absolute; width: 100%; height: 2px;
            background: rgba(59, 130, 246, 0.5);
            box-shadow: 0 0 15px 5px rgba(59, 130, 246, 0.5);
            animation: scan 2s linear infinite;
        }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
    </style>
</head>
<body class="bg-slate-950 text-white antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        const IconCar = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><path d="M9 17h6"/><circle cx="17" cy="17" r="2"/></svg>;
        const IconZap = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>;
        const IconAlert = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>;
        const IconCheck = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>;

        const App = () => {
            const [apiKey, setApiKey] = useState("");
            const [isKeyEntered, setIsKeyEntered] = useState(false);
            const [stream, setStream] = useState(null);
            const [photo, setPhoto] = useState(null);
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [result, setResult] = useState(null);
            const [error, setError] = useState(null);
            const [cameraStatus, setCameraStatus] = useState('initializing');
            const videoRef = useRef(null);

            const today = new Date();
            const day = today.getDate();
            const isEvenDay = day % 2 === 0;

            useEffect(() => {
                if (isKeyEntered) {
                    startCamera();
                }
                return () => { if (stream) stream.getTracks().forEach(t => t.stop()); };
            }, [isKeyEntered]);

            const startCamera = async () => {
                setCameraStatus('initializing');
                setError(null);
                try {
                    const constraints = { video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 } } };
                    const newStream = await navigator.mediaDevices.getUserMedia(constraints);
                    setStream(newStream);
                    if (videoRef.current) {
                        videoRef.current.srcObject = newStream;
                        videoRef.current.onloadedmetadata = () => {
                            videoRef.current.play();
                            setCameraStatus('ready');
                        };
                    }
                } catch (err) {
                    setError("카메라 권한이 필요합니다.");
                    setCameraStatus('error');
                }
            };

            const captureAndAnalyze = async () => {
                if (!videoRef.current || cameraStatus !== 'ready') return;
                
                const canvas = document.createElement('canvas');
                canvas.width = videoRef.current.videoWidth;
                canvas.height = videoRef.current.videoHeight;
                canvas.getContext('2d').drawImage(videoRef.current, 0, 0);
                const optimizedDataUrl = canvas.toDataURL('image/jpeg', 0.8);
                
                setPhoto(optimizedDataUrl);
                setIsAnalyzing(true);
                setResult(null);
                setError(null);

                const base64Data = optimizedDataUrl.split(',')[1];
                const prompt = "Identify car license plate. Return JSON only: {\"plateNumber\": \"string\", \"lastDigit\": number}. If no plate found, return {\"error\": \"NOT_FOUND\"}.";

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/jpeg", data: base64Data } }] }],
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });

                    const data = await response.json();
                    if (!response.ok) throw new Error(data.error?.message || "API Error");

                    const analysis = JSON.parse(data.candidates[0].content.parts[0].text);
                    if (analysis.error) throw new Error("번호판을 찾을 수 없습니다.");

                    const lastDigit = parseInt(analysis.lastDigit);
                    setResult({
                        plateNumber: analysis.plateNumber,
                        lastDigit: lastDigit,
                        isViolation: isEvenDay !== (lastDigit % 2 === 0)
                    });
                } catch (err) {
                    setError(err.message || "분석 중 오류가 발생했습니다.");
                } finally {
                    setIsAnalyzing(false);
                }
            };

            const reset = () => {
                setPhoto(null); setResult(null); setError(null);
                startCamera();
            };

            // API 키 입력 화면
            if (!isKeyEntered) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6">
                        <div className="w-full max-w-md bg-slate-900 p-8 rounded-[2.5rem] border border-white/10 shadow-2xl">
                            <div className="flex justify-center mb-6">
                                <div className="p-4 bg-blue-600 rounded-2xl shadow-lg shadow-blue-900/40"><IconCar /></div>
                            </div>
                            <h2 className="text-2xl font-black text-center mb-2">Google Gemini API 키 입력</h2>
                            <p className="text-slate-400 text-sm text-center mb-8 leading-relaxed">
                                분석 기능을 사용하려면 Google AI Studio에서 발급받은 API 키가 필요합니다. 입력된 키는 서버에 저장되지 않고 브라우저에서만 사용됩니다.
                            </p>
                            <input 
                                type="password" 
                                placeholder="AI Studio 키를 입력하세요" 
                                className="w-full bg-black/40 border border-white/10 rounded-2xl px-6 py-4 mb-4 focus:outline-none focus:border-blue-500 transition-all font-mono text-sm"
                                value={apiKey}
                                onChange={(e) => setApiKey(e.target.value)}
                            />
                            <button 
                                onClick={() => apiKey && setIsKeyEntered(true)}
                                className="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-black transition-all active:scale-95 disabled:opacity-50"
                                disabled={!apiKey}
                            >
                                판독기 시작하기
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col items-center">
                    <header className="w-full p-5 bg-slate-900/50 backdrop-blur-xl sticky top-0 z-30 flex justify-between items-center border-b border-white/5">
                        <div className="flex items-center gap-3">
                            <div className="p-2 bg-blue-600 rounded-xl"><IconCar /></div>
                            <h1 className="font-black text-xl tracking-tight">AI 2부제</h1>
                        </div>
                        <div className="flex flex-col items-end">
                            <span className="text-[10px] font-bold text-white/40 uppercase">TODAY {day}일</span>
                            <div className={`px-3 py-1 rounded-full text-[11px] font-black mt-1 ${isEvenDay ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20' : 'bg-orange-500/10 text-orange-400 border border-orange-500/20'}`}>
                                {isEvenDay ? '짝수 운행일' : '홀수 운행일'}
                            </div>
                        </div>
                    </header>

                    <main className="w-full max-w-md p-6">
                        <div className="relative aspect-[4/5] bg-slate-900 rounded-[3rem] overflow-hidden border-4 border-slate-800 shadow-2xl">
                            {!photo ? (
                                <>
                                    <video ref={videoRef} autoPlay playsInline muted className="w-full h-full object-cover" />
                                    <div className="absolute inset-12 border-2 border-white/20 rounded-3xl pointer-events-none flex items-center justify-center">
                                        <p className="text-[10px] uppercase tracking-widest text-white/50 font-bold bg-black/40 px-3 py-1 rounded-full">번호판을 중앙에 맞추세요</p>
                                    </div>
                                    <button onClick={captureAndAnalyze} className="absolute bottom-10 left-1/2 -translate-x-1/2 active:scale-90 transition-all">
                                        <div className="w-20 h-20 bg-white/10 rounded-full flex items-center justify-center backdrop-blur-xl border border-white/20">
                                            <div className="w-14 h-14 bg-white rounded-full border-[6px] border-slate-950" />
                                        </div>
                                    </button>
                                </>
                            ) : (
                                <div className="relative w-full h-full">
                                    <img src={photo} alt="captured" className="w-full h-full object-cover" />
                                    {isAnalyzing && (
                                        <div className="absolute inset-0 bg-slate-950/70 backdrop-blur-md flex flex-col items-center justify-center">
                                            <div className="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4" />
                                            <p className="font-black text-xl">AI 분석 중...</p>
                                        </div>
                                    )}
                                    <div className="scanning-line"></div>
                                </div>
                            )}
                        </div>

                        {result && (
                            <div className={`mt-8 p-8 rounded-[2.5rem] animate-in fade-in slide-in-from-bottom-10 duration-700 ${result.isViolation ? 'bg-red-600' : 'bg-emerald-600'}`}>
                                <div className="flex justify-between items-start mb-6">
                                    <div>
                                        <span className="text-[10px] font-black uppercase tracking-widest opacity-60">식별된 번호</span>
                                        <h2 className="text-4xl font-black tracking-tighter">{result.plateNumber}</h2>
                                    </div>
                                    <div className="bg-black/20 p-3 rounded-2xl">{result.isViolation ? <IconAlert /> : <IconCheck />}</div>
                                </div>
                                <div className="bg-black/10 rounded-2xl p-4 mb-6 text-sm font-bold">
                                    {result.isViolation ? "운행 제한 대상입니다." : "운행 가능한 차량입니다."}
                                    <p className="text-[11px] opacity-70 mt-1 font-medium">인식된 끝자리: {result.lastDigit}</p>
                                </div>
                                <button onClick={reset} className="w-full py-4 bg-white text-slate-950 rounded-2xl font-black active:scale-95 transition-all">새로 촬영</button>
                            </div>
                        )}

                        {error && (
                            <div className="mt-8 p-6 bg-slate-900 border border-red-500/30 rounded-[2rem] text-center animate-shake">
                                <p className="text-sm font-bold mb-4">{error}</p>
                                <button onClick={reset} className="px-6 py-2 bg-red-600 text-white rounded-xl font-bold text-xs">다시 시도</button>
                            </div>
                        )}
                    </main>

                    <footer className="p-10 opacity-30 text-[10px] text-center font-bold tracking-widest uppercase mt-auto">
                        © 2024 AI Vehicle Monitor
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
