<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 차량 2부제 판독기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #0a0c10; color: white; -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .camera-view { aspect-ratio: 3/4; position: relative; overflow: hidden; border-radius: 2.5rem; }
        .glass-panel { background: rgba(13, 17, 23, 0.85); backdrop-filter: blur(16px); }
        @keyframes scan {
            0% { transform: translateY(-100%); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(100%); opacity: 0; }
        }
        .scan-line {
            position: absolute; width: 100%; height: 2px;
            background: linear-gradient(to right, transparent, #6366f1, transparent);
            animation: scan 2s infinite ease-in-out;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center overflow-x-hidden">

    <!-- Top Navigation -->
    <header class="w-full p-5 glass-panel flex justify-between items-center border-b border-white/5 sticky top-0 z-50 shadow-2xl">
        <div class="flex items-center gap-4">
            <div class="bg-indigo-600 p-2 rounded-xl shadow-lg shadow-indigo-500/30">
                <i data-lucide="scan-line" class="text-white w-6 h-6"></i>
            </div>
            <div>
                <h1 class="font-black text-lg text-white leading-tight">차량 2부제 판독기</h1>
                <div class="flex flex-col">
                    <p class="text-[10px] text-slate-400 font-bold tracking-wider uppercase">Smart Compliance System</p>
                    <p class="text-[9px] text-indigo-400 font-medium">Developed by Teach for Future & Vibe Coding Lab</p>
                </div>
            </div>
        </div>
        <div class="flex flex-col items-end gap-1">
            <div id="date-display" class="text-[10px] font-black bg-indigo-500/10 text-indigo-300 px-3 py-1 rounded-full border border-indigo-500/20">
                로딩중...
            </div>
            <button onclick="toggleKeyModal(true)" class="text-[10px] text-slate-500 flex items-center gap-1 hover:text-white transition-colors">
                <i data-lucide="settings" class="w-3 h-3"></i> API 설정
            </button>
        </div>
    </header>

    <main class="w-full max-w-md p-4 flex-1 flex flex-col gap-6 relative">
        <!-- Main Viewport -->
        <div id="cam-container" class="camera-view bg-slate-900 border border-white/10 shadow-2xl shadow-black">
            <video id="video" autoplay playsinline muted class="w-full h-full object-cover"></video>
            <canvas id="canvas" class="hidden"></canvas>
            
            <!-- Scan Guide -->
            <div id="guide-overlay" class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                <div class="w-72 h-44 border-2 border-white/20 rounded-3xl relative overflow-hidden">
                    <div class="scan-line"></div>
                    <!-- Corners -->
                    <div class="absolute top-0 left-0 w-8 h-8 border-t-4 border-l-4 border-indigo-500 rounded-tl-xl"></div>
                    <div class="absolute top-0 right-0 w-8 h-8 border-t-4 border-r-4 border-indigo-500 rounded-tr-xl"></div>
                    <div class="absolute bottom-0 left-0 w-8 h-8 border-b-4 border-l-4 border-indigo-500 rounded-bl-xl"></div>
                    <div class="absolute bottom-0 right-0 w-8 h-8 border-b-4 border-r-4 border-indigo-500 rounded-br-xl"></div>
                </div>
                <p class="mt-8 text-xs font-bold text-white/70 bg-black/40 px-4 py-2 rounded-full backdrop-blur-sm">번호판을 박스 안에 맞춰주세요</p>
            </div>

            <!-- Capture Button Area -->
            <div class="absolute bottom-8 left-0 right-0 flex justify-center">
                <button id="shutter" class="w-20 h-20 bg-white rounded-full flex items-center justify-center shadow-2xl active:scale-90 transition-transform group">
                    <div class="w-16 h-16 rounded-full border-4 border-slate-900 flex items-center justify-center">
                        <i data-lucide="camera" class="text-slate-900 w-8 h-8"></i>
                    </div>
                </button>
            </div>
        </div>

        <!-- Result Panel (Hidden by default) -->
        <div id="result-panel" class="hidden animate-in fade-in slide-in-from-bottom-4 duration-500"></div>

        <!-- API Key Modal -->
        <div id="key-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/90 backdrop-blur-md">
            <div class="w-full max-w-sm glass-panel p-8 rounded-[2.5rem] border border-white/10">
                <div class="w-16 h-16 bg-indigo-600/20 rounded-2xl flex items-center justify-center mx-auto mb-6">
                    <i data-lucide="key" class="text-indigo-400 w-8 h-8"></i>
                </div>
                <h3 class="text-xl font-black text-center mb-2">Gemini API 키 설정</h3>
                
                <div class="bg-indigo-500/10 border border-indigo-500/20 rounded-2xl p-4 mb-6">
                    <p class="text-[11px] text-indigo-300 font-bold mb-2 flex items-center gap-1">
                        <i data-lucide="external-link" class="w-3 h-3"></i> 키가 없으신가요?
                    </p>
                    <a href="https://aistudio.google.com/app/apikey" target="_blank" class="text-[12px] text-white underline decoration-indigo-500 underline-offset-4 font-medium block">
                        Google AI Studio에서 무료 키 받기
                    </a>
                    <p class="text-[10px] text-slate-500 mt-2 leading-relaxed">
                        'Create API key in new project' 버튼을 눌러 발급된 <span class="text-indigo-400">AIza...</span> 키를 아래에 입력하세요.
                    </p>
                </div>

                <input type="password" id="api-input" placeholder="여기에 키를 붙여넣으세요" 
                    class="w-full bg-slate-800 border border-white/10 rounded-2xl px-4 py-4 text-center text-sm font-mono tracking-widest focus:ring-2 focus:ring-indigo-500 focus:outline-none mb-4">
                
                <button onclick="saveKey()" class="w-full py-4 bg-indigo-600 hover:bg-indigo-500 text-white rounded-2xl font-black transition-colors shadow-lg shadow-indigo-600/20">저장 및 분석 시작</button>
                <button onclick="toggleKeyModal(false)" class="w-full mt-2 py-3 text-slate-500 text-xs font-bold">닫기</button>
            </div>
        </div>

        <!-- Loader -->
        <div id="loader" class="hidden fixed inset-0 z-[200] bg-slate-950/80 backdrop-blur-xl flex flex-col items-center justify-center">
            <div class="relative w-20 h-20">
                <div class="absolute inset-0 border-4 border-indigo-500/20 rounded-full"></div>
                <div class="absolute inset-0 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
            </div>
            <p class="mt-6 font-black text-xl text-white tracking-tighter">AI 번호판 판독 중...</p>
            <p class="text-slate-500 text-sm mt-2">잠시만 기다려 주세요</p>
        </div>
    </main>

    <script>
        let API_KEY = localStorage.getItem('GEMINI_KEY') || '';
        const MODEL = "gemini-1.5-flash";
        let videoStream = null;

        const video = document.getElementById('video');
        const shutter = document.getElementById('shutter');
        const loader = document.getElementById('loader');
        const resultPanel = document.getElementById('result-panel');
        const camContainer = document.getElementById('cam-container');
        const apiInput = document.getElementById('api-input');
        const keyModal = document.getElementById('key-modal');

        // Initialize Date
        const today = new Date();
        const dateStr = `${today.getMonth() + 1}월 ${today.getDate()}일`;
        const isEvenDay = today.getDate() % 2 === 0;
        document.getElementById('date-display').innerText = `${dateStr} (${isEvenDay ? '짝수' : '홀수'}날)`;

        function toggleKeyModal(show) {
            keyModal.classList.toggle('hidden', !show);
            if(show) apiInput.value = API_KEY;
        }

        function saveKey() {
            const key = apiInput.value.trim();
            if(key) {
                API_KEY = key;
                localStorage.setItem('GEMINI_KEY', key);
                toggleKeyModal(false);
                startCamera();
            }
        }

        async function startCamera() {
            if(!API_KEY) { toggleKeyModal(true); return; }
            try {
                if(videoStream) videoStream.getTracks().forEach(t => t.stop());
                videoStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: { ideal: 1280 } }
                });
                video.srcObject = videoStream;
            } catch (err) {
                alert("카메라를 켤 수 없습니다. 권한을 허용해 주세요.");
            }
        }

        async function analyzePlate() {
            if(!API_KEY) { toggleKeyModal(true); return; }
            
            loader.classList.remove('hidden');
            
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 640;
            canvas.height = (video.videoHeight / video.videoWidth) * 640;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const base64Img = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];

            const prompt = "Identify the South Korean license plate in this image. Respond ONLY with a JSON object: {\"plate\": \"Full Plate Number\", \"lastDigit\": 0}. If no plate found, return {\"error\": \"not_found\"}.";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/jpeg", data: base64Img } }] }]
                    })
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.error?.message || "연결 실패");

                let text = data.candidates[0].content.parts[0].text;
                const jsonMatch = text.match(/\{.*\}/s);
                if (!jsonMatch) throw new Error("분석 포맷 오류");
                
                const result = JSON.parse(jsonMatch[0]);

                if (result.error) {
                    showError("번호판을 인식하지 못했습니다. 더 가깝고 선명하게 촬영해 주세요.");
                } else {
                    showSuccess(result);
                }
            } catch (err) {
                showError("분석 오류: " + err.message);
            } finally {
                loader.classList.add('hidden');
            }
        }

        function showSuccess(data) {
            const isViolation = isEvenDay !== (data.lastDigit % 2 === 0);
            camContainer.classList.add('hidden');
            resultPanel.classList.remove('hidden');
            
            resultPanel.innerHTML = `
                <div class="p-8 glass-panel rounded-[2.5rem] border-2 ${isViolation ? 'border-red-500/40 bg-red-500/5' : 'border-emerald-500/40 bg-emerald-500/5'} shadow-2xl">
                    <div class="flex justify-between items-start mb-8">
                        <div>
                            <p class="text-[10px] font-black uppercase tracking-widest text-slate-500 mb-1">판독 결과</p>
                            <h2 class="text-4xl font-black text-white tracking-tighter">${data.plate}</h2>
                        </div>
                        <div class="w-14 h-14 rounded-2xl flex items-center justify-center ${isViolation ? 'bg-red-600 shadow-lg shadow-red-600/40' : 'bg-emerald-600 shadow-lg shadow-emerald-600/40'}">
                            <i data-lucide="${isViolation ? 'x' : 'check'}" class="text-white w-8 h-8"></i>
                        </div>
                    </div>
                    
                    <div class="p-6 bg-black/40 rounded-3xl mb-8 border border-white/5">
                        <p class="text-2xl font-black ${isViolation ? 'text-red-400' : 'text-emerald-400'} mb-1">
                            ${isViolation ? '운행 제한 대상' : '정상 운행 가능'}
                        </p>
                        <p class="text-xs text-slate-400 leading-relaxed font-medium">
                            오늘(${today.getDate()}일)은 <span class="text-white font-bold">${isEvenDay ? '짝수' : '홀수'}</span> 차량의 운행일입니다.
                        </p>
                    </div>

                    <button onclick="resetApp()" class="w-full py-5 bg-white text-slate-950 rounded-2xl font-black text-lg active:scale-95 transition-transform shadow-xl">
                        새로 촬영하기
                    </button>
                </div>
            `;
            lucide.createIcons();
        }

        function showError(msg) {
            camContainer.classList.add('hidden');
            resultPanel.classList.remove('hidden');
            resultPanel.innerHTML = `
                <div class="p-8 glass-panel rounded-[2.5rem] border border-red-500/20 text-center">
                    <div class="w-16 h-16 bg-red-500/10 rounded-full flex items-center justify-center mx-auto mb-6">
                        <i data-lucide="alert-circle" class="text-red-500 w-8 h-8"></i>
                    </div>
                    <p class="text-white font-bold mb-8 leading-relaxed">${msg}</p>
                    <button onclick="resetApp()" class="w-full py-4 bg-white/5 text-white border border-white/10 rounded-2xl font-black">다시 촬영</button>
                </div>
            `;
            lucide.createIcons();
        }

        function resetApp() {
            resultPanel.classList.add('hidden');
            camContainer.classList.remove('hidden');
            startCamera();
        }

        shutter.onclick = analyzePlate;
        window.onload = () => {
            startCamera();
            lucide.createIcons();
        };
    </script>
</body>
</html>
